<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated project radar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070d19"/>
      <stop offset="100%" stop-color="#10213e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#00ffb3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <g stroke="#2b4369" stroke-opacity="0.45">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
  </g>

  <g fill="#9ef4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1.2">
    <text x="36" y="36">PROJECT RADAR</text>
    <text x="1020" y="36">LIVE STATUS FLOW</text>
  </g>

  <g filter="url(#glow)">
    <path id="flowPath" d="M110 190 C 280 60, 430 220, 610 120 S 920 50, 1100 150" fill="none" stroke="url(#line)" stroke-width="3"/>

    <circle r="6" fill="#00ffb3">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#flowPath"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#00d9ff">
      <animateMotion dur="8s" repeatCount="indefinite">
        <mpath href="#flowPath"/>
      </animateMotion>
    </circle>
  </g>

  <g>
    <rect x="120" y="165" width="240" height="72" rx="10" fill="#0f223f" stroke="#2f5f90"/>
    <text x="140" y="192" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">VisioAI</text>
    <text x="140" y="214" fill="#78e7ff" font-family="JetBrains Mono, monospace" font-size="11">Status: Planned</text>
    <circle cx="330" cy="201" r="7" fill="#fbbf24">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="470" y="90" width="300" height="80" rx="10" fill="#102845" stroke="#3a719f"/>
    <text x="490" y="118" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">SignifyAI + ERP System</text>
    <text x="490" y="142" fill="#7fffd4" font-family="JetBrains Mono, monospace" font-size="11">Status: Actively Developing</text>
    <circle cx="735" cy="130" r="8" fill="#22c55e">
      <animate attributeName="r" values="7;9;7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="860" y="170" width="250" height="72" rx="10" fill="#0f223f" stroke="#2f5f90"/>
    <text x="880" y="196" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">SportPulse</text>
    <text x="880" y="218" fill="#8fd8ff" font-family="JetBrains Mono, monospace" font-size="11">Status: Completed</text>
    <circle cx="1080" cy="206" r="7" fill="#38bdf8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="0" y="0" width="1200" height="4" fill="#00d9ff" opacity="0.25">
    <animate attributeName="y" values="0;276;0" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
