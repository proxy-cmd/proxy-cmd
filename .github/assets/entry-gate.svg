<svg width="680" height="66" viewBox="0 0 680 66" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile entry banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1f36"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="678" height="64" rx="10" fill="url(#bg)" stroke="#30363d"/>
  <rect x="-220" y="1" width="220" height="64" fill="url(#scan)">
    <animate attributeName="x" from="-220" to="700" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <circle cx="26" cy="33" r="5" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="42" y="39" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Ujjwal Sharma</text>
  <text x="265" y="39" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">AI | ML | Data Science</text>
</svg>
