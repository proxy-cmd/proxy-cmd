<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neural dock animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#10294a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#00ffbf"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#39b8ff" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#grid)"/>

  <g opacity="0.75" filter="url(#softGlow)">
    <line x1="0" y1="55" x2="1200" y2="55" stroke="url(#lineGrad)" stroke-width="1.2"/>
    <line x1="0" y1="205" x2="1200" y2="205" stroke="url(#lineGrad)" stroke-width="1.2"/>
  </g>

  <rect x="0" y="0" width="1200" height="5" fill="#00e5ff" opacity="0.18">
    <animate attributeName="y" values="0;255;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(150 80)">
    <polygon points="0,26 38,6 76,26 38,46" fill="#1f3e66"/>
    <polygon points="0,26 0,70 38,90 38,46" fill="#163052"/>
    <polygon points="76,26 76,70 38,90 38,46" fill="#2f5b8f"/>
    <animateTransform attributeName="transform" type="translate" values="150 80;150 65;150 80" dur="3.2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(980 90)">
    <polygon points="0,22 30,6 60,22 30,38" fill="#294f7e"/>
    <polygon points="0,22 0,56 30,72 30,38" fill="#17365d"/>
    <polygon points="60,22 60,56 30,72 30,38" fill="#3c76ad"/>
    <animateTransform attributeName="transform" type="translate" values="980 90;980 106;980 90" dur="3.8s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(600 130)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#00d9ff" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="0" cy="0" r="24" fill="#00d9ff" fill-opacity="0.22"/>
    <circle cx="0" cy="0" r="8" fill="#00fff2"/>
    <line x1="0" y1="0" x2="0" y2="-46" stroke="#00fff2" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="-46" r="3" fill="#00fff2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#96f6ff" font-family="JetBrains Mono, monospace" letter-spacing="1.5">
    <text x="54" y="38" font-size="14">MODEL DECK ONLINE</text>
    <text x="872" y="38" font-size="13">VISION + ML + DATA</text>
    <text x="455" y="238" font-size="12" fill="#5bdcf0">LIVE PROFILE RENDER</text>
  </g>
</svg>
