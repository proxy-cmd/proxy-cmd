<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Story mode project timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101c"/>
      <stop offset="100%" stop-color="#112748"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#00ffb3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <text x="36" y="34" fill="#9ef4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1.1">STORY MODE // PROJECT TIMELINE</text>

  <line x1="80" y1="138" x2="1120" y2="138" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>

  <g>
    <circle cx="180" cy="138" r="16" fill="#fbbf24"/>
    <text x="136" y="180" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">VisioAI</text>
    <text x="126" y="198" fill="#9ad8ff" font-family="JetBrains Mono, monospace" font-size="11">Planned</text>
  </g>

  <g>
    <circle cx="460" cy="138" r="16" fill="#22c55e">
      <animate attributeName="r" values="14;18;14" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="406" y="180" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">SignifyAI</text>
    <text x="396" y="198" fill="#9ad8ff" font-family="JetBrains Mono, monospace" font-size="11">Developing</text>
  </g>

  <g>
    <circle cx="740" cy="138" r="16" fill="#22c55e">
      <animate attributeName="r" values="14;18;14" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="662" y="180" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">University ERP</text>
    <text x="672" y="198" fill="#9ad8ff" font-family="JetBrains Mono, monospace" font-size="11">Developing</text>
  </g>

  <g>
    <circle cx="1020" cy="138" r="16" fill="#38bdf8"/>
    <text x="970" y="180" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="12">SportPulse</text>
    <text x="968" y="198" fill="#9ad8ff" font-family="JetBrains Mono, monospace" font-size="11">Completed</text>
  </g>

  <circle r="8" fill="#00ffb3" filter="url(#glow)">
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#route"/>
    </animateMotion>
  </circle>
  <path id="route" d="M180 138 L460 138 L740 138 L1020 138" fill="none"/>

  <rect x="0" y="0" width="1200" height="4" fill="#00d9ff" opacity="0.22">
    <animate attributeName="y" values="0;256;0" dur="7.5s" repeatCount="indefinite"/>
  </rect>
</svg>
