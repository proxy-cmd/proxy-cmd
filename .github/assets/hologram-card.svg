<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hologram card animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b16"/>
      <stop offset="100%" stop-color="#0f2242"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#00ffc6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <g stroke="#2b4369" stroke-opacity="0.35">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <g transform="translate(120 55)">
    <rect x="0" y="0" width="630" height="210" rx="16" fill="#0f1f3b" stroke="url(#cardGlow)" stroke-width="2" filter="url(#glow)"/>
    <text x="30" y="52" fill="#eafcff" font-family="JetBrains Mono, monospace" font-size="28">Ujjwal Sharma</text>
    <text x="30" y="86" fill="#7de8ff" font-family="JetBrains Mono, monospace" font-size="15">AI | ML Student | Data Science Enthusiast</text>

    <g fill="#8beeff" font-family="JetBrains Mono, monospace" font-size="13">
      <text x="30" y="126">Focus: AI, Machine Learning, Data Science</text>
      <text x="30" y="150">Current Work: SignifyAI + University ERP</text>
      <text x="30" y="174">Next Build: VisioAI Object Detection</text>
    </g>

    <rect x="30" y="188" width="280" height="6" rx="3" fill="#15345f"/>
    <rect x="30" y="188" width="210" height="6" rx="3" fill="#00d9ff">
      <animate attributeName="width" values="180;245;180" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(870 160)" filter="url(#glow)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00d9ff" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00ffc6" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#00d9ff" fill-opacity="0.25"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#00ffc6" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="-70" r="4" fill="#00ffc6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(965 95)">
    <polygon points="0,18 26,4 52,18 26,32" fill="#2c5a8a"/>
    <polygon points="0,18 0,48 26,62 26,32" fill="#193b63"/>
    <polygon points="52,18 52,48 26,62 26,32" fill="#3a76ad"/>
    <animateTransform attributeName="transform" type="translate" values="965 95;965 78;965 95" dur="3.4s" repeatCount="indefinite"/>
  </g>

  <text x="40" y="32" fill="#9ef4ff" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="1.1">HOLOGRAM CARD // LIVE PROFILE</text>
</svg>
