name: Generate Profile Animations

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate pacman animation
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: proxy-cmd

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: proxy-cmd
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate lines changed card
        env:
          GH_USER: proxy-cmd
          ALL_REPOS_PAT: ${{ secrets.ALL_REPOS_PAT }}
        run: |
          set -euo pipefail
          mkdir -p dist

          write_svg() {
            local title="$1"
            local subtitle="$2"
            local changed="$3"
            local added="$4"
            local deleted="$5"
            cat > dist/lines-changed.svg <<EOF
          <svg width="495" height="150" viewBox="0 0 495 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lines changed card">
            <rect width="495" height="150" rx="10" fill="#0d1117"/>
            <rect x="1" y="1" width="493" height="148" rx="9" fill="none" stroke="#30363d"/>
            <text x="24" y="38" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">${title}</text>
            <text x="24" y="72" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="16">${subtitle}</text>
            <text x="24" y="118" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">${changed}</text>
            <text x="210" y="118" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="16">(+${added} / -${deleted})</text>
          </svg>
          EOF
          }

          # Fallback: this repository only
          fallback_repo_only() {
            ADDED=$(git log --pretty=tformat: --numstat | awk '{if ($1 ~ /^[0-9]+$/) add += $1} END {print add+0}')
            DELETED=$(git log --pretty=tformat: --numstat | awk '{if ($2 ~ /^[0-9]+$/) del += $2} END {print del+0}')
            CHANGED=$((ADDED + DELETED))
            write_svg "Total lines of code changed." "Total Lines Changed (This Repo)" "$CHANGED" "$ADDED" "$DELETED"
          }

          read_previous_totals() {
            prev_changed=""
            prev_added=""
            prev_deleted=""

            git fetch --no-tags origin output:refs/remotes/origin/output >/dev/null 2>&1 || true
            prev_svg=$(git show origin/output:lines-changed.svg 2>/dev/null || true)

            if [ -n "$prev_svg" ]; then
              prev_changed=$(echo "$prev_svg" | sed -n 's/.*font-size="34" font-weight="700">\([0-9][0-9]*\)<.*/\1/p' | head -n1)
              prev_added=$(echo "$prev_svg" | sed -n 's/.*(+\([0-9][0-9]*\) \/ -\([0-9][0-9]*\)).*/\1/p' | head -n1)
              prev_deleted=$(echo "$prev_svg" | sed -n 's/.*(+\([0-9][0-9]*\) \/ -\([0-9][0-9]*\)).*/\2/p' | head -n1)
            fi
          }

          read_previous_totals

          if [ -z "${ALL_REPOS_PAT:-}" ]; then
            echo "ALL_REPOS_PAT not set. Using repo-only stats."
            fallback_repo_only
            exit 0
          fi

          total_added=0
          total_deleted=0
          repo_count=0
          missing_stats=0
          page=1

          while :; do
            repos_json=$(curl -sS \
              -H "Authorization: Bearer ${ALL_REPOS_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/repos?visibility=all&affiliation=owner&per_page=100&page=${page}")

            count=$(echo "$repos_json" | jq 'length')
            if [ "$count" -eq 0 ]; then
              break
            fi

            while IFS= read -r repo; do
              [ -z "$repo" ] && continue
              repo_count=$((repo_count + 1))

              data=""
              for attempt in 1 2 3 4 5 6; do
                code_and_body=$(mktemp)
                status=$(curl -sS -o "$code_and_body" -w "%{http_code}" \
                  -H "Authorization: Bearer ${ALL_REPOS_PAT}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${repo}/stats/contributors")

                if [ "$status" = "202" ]; then
                  rm -f "$code_and_body"
                  sleep 2
                  continue
                fi

                if [ "$status" = "200" ]; then
                  data=$(cat "$code_and_body")
                fi
                rm -f "$code_and_body"
                break
              done

              if [ -n "$data" ]; then
                repo_added=$(echo "$data" | jq --arg u "$GH_USER" '[.[] | select(.author.login == $u) | .weeks[]? | .a] | add // 0')
                repo_deleted=$(echo "$data" | jq --arg u "$GH_USER" '[.[] | select(.author.login == $u) | .weeks[]? | .d] | add // 0')
                total_added=$((total_added + repo_added))
                total_deleted=$((total_deleted + repo_deleted))
              else
                missing_stats=$((missing_stats + 1))
              fi
            done < <(echo "$repos_json" | jq -r '.[].full_name')

            page=$((page + 1))
          done

          total_changed=$((total_added + total_deleted))
          echo "Processed repos: ${repo_count}; repos with unavailable stats: ${missing_stats}"

          # Keep the card monotonic. GitHub stats endpoints can return partial data (202),
          # which otherwise causes visible drops between runs.
          if [ -n "${prev_changed:-}" ] && [ "$total_changed" -lt "$prev_changed" ]; then
            echo "Current total (${total_changed}) is lower than previous (${prev_changed}); keeping previous totals."
            total_changed="$prev_changed"
            if [ -n "${prev_added:-}" ] && [ -n "${prev_deleted:-}" ]; then
              total_added="$prev_added"
              total_deleted="$prev_deleted"
            fi
          fi

          subtitle="Total Lines Of Code Changed (Public + Private Repo)"
          write_svg "Code Change Stats" "$subtitle" "$total_changed" "$total_added" "$total_deleted"

      - name: Generate profile signal card
        env:
          GH_USER: proxy-cmd
          ALL_REPOS_PAT: ${{ secrets.ALL_REPOS_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist

          auth_token="${ALL_REPOS_PAT:-${GITHUB_TOKEN:-}}"

          api_get() {
            local url="$1"
            if [ -n "${auth_token:-}" ]; then
              curl -fsSL \
                -H "Authorization: Bearer ${auth_token}" \
                -H "Accept: application/vnd.github+json" \
                "$url"
            else
              curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                "$url"
            fi
          }

          repo_endpoint="https://api.github.com/users/${GH_USER}/repos?per_page=100&page="
          if [ -n "${ALL_REPOS_PAT:-}" ]; then
            repo_endpoint="https://api.github.com/user/repos?visibility=all&affiliation=owner&per_page=100&page="
          fi

          repo_count=0
          star_count=0
          fork_count=0
          page=1

          while :; do
            repos_json=$(api_get "${repo_endpoint}${page}")
            count=$(echo "$repos_json" | jq 'length')
            if [ "$count" -eq 0 ]; then
              break
            fi

            repo_count=$((repo_count + count))
            page_stars=$(echo "$repos_json" | jq '[.[].stargazers_count] | add // 0')
            page_forks=$(echo "$repos_json" | jq '[.[].forks_count] | add // 0')
            star_count=$((star_count + page_stars))
            fork_count=$((fork_count + page_forks))
            page=$((page + 1))
          done

          if [ -n "${ALL_REPOS_PAT:-}" ]; then
            user_scope="user:${GH_USER}"
          else
            user_scope="user:${GH_USER}+is:public"
          fi

          total_issues=$(api_get "https://api.github.com/search/issues?q=author:${GH_USER}+type:issue+${user_scope}" | jq '.total_count // 0')
          closed_issues=$(api_get "https://api.github.com/search/issues?q=author:${GH_USER}+type:issue+state:closed+${user_scope}" | jq '.total_count // 0')

          streak_svg=$(curl -fsSL "https://streak-stats.demolab.com?user=${GH_USER}&theme=tokyonight&hide_border=true&v=$(date +%s)")
          contributions=$(printf "%s" "$streak_svg" | perl -0ne 'print "$1\n" if /<!-- Total Contributions big number -->.*?<text[^>]*>\s*([0-9]+)\s*<\/text>/s')
          if [ -z "${contributions:-}" ]; then
            contributions=0
          fi

          cat > dist/profile-signal.svg <<EOF
          <svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile signal board">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0b1320"/>
                <stop offset="100%" stop-color="#0d1117"/>
              </linearGradient>
              <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#00d9ff"/>
                <stop offset="100%" stop-color="#1f6feb"/>
              </linearGradient>
            </defs>

            <rect x="1" y="1" width="898" height="398" rx="14" fill="url(#bg)" stroke="#2b3440"/>
            <rect x="1" y="1" width="898" height="58" rx="14" fill="#0f1828" stroke="#2b3440"/>
            <text x="26" y="37" fill="#00d9ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.8">PROFILE SIGNAL BOARD</text>
            <text x="696" y="37" fill="#7d8590" font-family="Segoe UI, Arial, sans-serif" font-size="12">LIVE SNAPSHOT</text>

            <line x1="26" y1="106" x2="874" y2="106" stroke="url(#line)" stroke-width="1.2" opacity="0.45"/>
            <line x1="530" y1="120" x2="530" y2="368" stroke="#2b3440" stroke-width="1"/>

            <circle cx="54" cy="142" r="6" fill="#3fb950">
              <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
            </circle>
            <text x="74" y="147" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">ONLINE</text>

            <text x="36" y="218" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Ujjwal Sharma</text>
            <text x="36" y="258" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24">AI | ML Student | Data Science Enthusiast</text>
            <text x="36" y="294" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="17">Build mode: shipping, debugging, improving</text>

            <text x="562" y="150" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">Total Repo</text>
            <text x="850" y="150" text-anchor="end" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">${repo_count}</text>
            <line x1="552" y1="160" x2="860" y2="160" stroke="#2b3440" stroke-width="1" opacity="0.45"/>

            <text x="562" y="192" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">Star Count</text>
            <text x="850" y="192" text-anchor="end" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">${star_count}</text>
            <line x1="552" y1="202" x2="860" y2="202" stroke="#2b3440" stroke-width="1" opacity="0.45"/>

            <text x="562" y="234" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">Fork Count</text>
            <text x="850" y="234" text-anchor="end" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">${fork_count}</text>
            <line x1="552" y1="244" x2="860" y2="244" stroke="#2b3440" stroke-width="1" opacity="0.45"/>

            <text x="562" y="276" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">Contributions</text>
            <text x="850" y="276" text-anchor="end" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">${contributions}</text>
            <line x1="552" y1="286" x2="860" y2="286" stroke="#2b3440" stroke-width="1" opacity="0.45"/>

            <text x="562" y="318" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">Total Issues</text>
            <text x="850" y="318" text-anchor="end" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">${total_issues}</text>
            <line x1="552" y1="328" x2="860" y2="328" stroke="#2b3440" stroke-width="1" opacity="0.45"/>

            <text x="562" y="360" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="21">Closed Issues</text>
            <text x="850" y="360" text-anchor="end" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">${closed_issues}</text>
          </svg>
          EOF

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
