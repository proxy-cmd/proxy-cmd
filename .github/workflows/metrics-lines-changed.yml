name: Update lines-changed card

on:
  schedule:
    - cron: "20 0 * * *" # 05:50 IST daily
  workflow_dispatch:

jobs:
  lines-changed:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow pushing to output branch
    steps:
      - name: Generate lines changed card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: proxy-cmd
          template: classic
          base: ""
          filename: lines-changed.svg
          committer_branch: output
          committer_message: "Update lines-changed card"
          config_timezone: Asia/Calcutta
          repositories_affiliations: owner,collaborator,organization_member
          plugin_lines: yes
          plugin_lines_sections: total
          plugin_lines_history_limit: 365
          plugin_lines_repositories_limit: 200
